<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Data Types</title>
</head>
<body>
    <main>
        <h1>JavaScript Data Types</h1>
    <script>
        // Here start the JavaScript code
        var name;
        console.log(name); // ?
        console.log("The variable 'name' Data type is:" + typeof (name));

        var a; // undefined (automatic)
        var b = null; // null (intentional)

        /*
            undefined   => JavaScript didn't assign a value
            null        => You intentionally set "no value"
        */

        console.log(a); // ?
        console.log("The variable 'a' Data type is:" + typeof (a));

        console.log(b); // ?
        console.log("The variable 'b' Data type is:" + typeof (b)); 

        /*
            Real-world analogy
            undefined   => JavaScript didn't assign a value
            null        => You intentionally set "no value"
        */

        console.log(a); // ?
        console.log("The variable 'a' Data type is:" + typeof (a));

        console.log(b); // ?
        console.log("The variable 'b' Data type is:" + typeof (b)); 
        
        /*

    </script>
    </main>
